<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Multi-Agent Memory Systems">
  <title>Multi-Agent Memory Systems</title>
  <desc>Layered memory architecture showing short-term context, persistent state store, and vector retrieval interacting</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="50%" stop-color="#1e0f3a"/>
      <stop offset="100%" stop-color="#0c0a1d"/>
    </linearGradient>
    <linearGradient id="shortTerm" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="persistent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="vector" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="680" fill="url(#grid)"/>
  </g>
  <g transform="translate(200, 140)">
    <rect x="0" y="0" width="800" height="50" rx="8" fill="url(#shortTerm)" opacity="0.85"/>
    <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">SHORT-TERM CONTEXT</text>
    <text x="370" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ffffff" fill-opacity="0.5" text-anchor="start" letter-spacing="1">context window</text>
  </g>
  <g transform="translate(200, 220)">
    <rect x="0" y="0" width="800" height="50" rx="8" fill="url(#persistent)" opacity="0.85"/>
    <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="bold">PERSISTENT STRUCTURED STATE</text>
    <text x="360" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ffffff" fill-opacity="0.5" text-anchor="start" letter-spacing="1">typed checkpoints</text>
  </g>
  <g transform="translate(200, 300)">
    <rect x="0" y="0" width="800" height="50" rx="8" fill="url(#vector)" opacity="0.85"/>
    <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#0c0a1d" text-anchor="middle" font-weight="bold">VECTOR-BASED RETRIEVAL</text>
    <text x="358" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0c0a1d" fill-opacity="0.5" text-anchor="start" letter-spacing="1">semantic search</text>
  </g>
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#e0e7ff" text-anchor="middle" dominant-baseline="middle">Multi-Agent Memory Systems</text>
  <text x="600" y="465" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b8cba" text-anchor="middle" dominant-baseline="middle">What Actually Works in Production</text>
  <line x1="400" y1="500" x2="800" y2="500" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <text x="600" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6366f1" text-anchor="middle" letter-spacing="3">STATE MANAGEMENT • CONTEXT INJECTION • MEMORY LIFECYCLE</text>
</svg>
