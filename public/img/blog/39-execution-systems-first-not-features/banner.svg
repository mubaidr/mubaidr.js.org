<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="Execution Systems First">
  <title>Execution Systems First</title>
  <desc>System architecture diagram showing execution flow design, state management, and task decomposition layers</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g opacity="0.03">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="680" fill="url(#grid)"/>
  </g>
  <g transform="translate(200, 160)">
    <rect x="0" y="0" width="800" height="60" rx="8" fill="url(#layer1)" opacity="0.9"/>
    <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#0b0f19" text-anchor="middle" font-weight="bold">EXECUTION FLOW DESIGN</text>
  </g>
  <g transform="translate(200, 250)">
    <rect x="0" y="0" width="800" height="60" rx="8" fill="url(#layer2)" opacity="0.9"/>
    <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#ffffff" text-anchor="middle" font-weight="bold">STATE MANAGEMENT ARCHITECTURE</text>
  </g>
  <g transform="translate(200, 340)">
    <rect x="0" y="0" width="800" height="60" rx="8" fill="url(#layer3)" opacity="0.9"/>
    <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#0b0f19" text-anchor="middle" font-weight="bold">TASK DECOMPOSITION</text>
  </g>
  <line x1="600" y1="220" x2="600" y2="250" stroke="#6366f1" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="600" y1="310" x2="600" y2="340" stroke="#22c55e" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#e0e7ff" text-anchor="middle" dominant-baseline="middle">I Stopped Building Features First</text>
  <text x="600" y="505" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b8cba" text-anchor="middle" dominant-baseline="middle">I Now Design Execution Systems First</text>
  <line x1="400" y1="535" x2="800" y2="535" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  <text x="600" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#f59e0b" text-anchor="middle" letter-spacing="3">SYSTEMS DESIGN • EXECUTION FLOW • STATE MANAGEMENT</text>
</svg>
