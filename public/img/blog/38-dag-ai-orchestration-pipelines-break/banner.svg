<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-label="DAG-Based AI Orchestration">
  <title>DAG-Based AI Orchestration</title>
  <desc>Directed acyclic graph showing parallel agent waves with branching and merging execution paths</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#0f2847"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="nodeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="nodeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g opacity="0.03">
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="680" fill="url(#grid)"/>
  </g>
  <g transform="translate(100, 240)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W1:A</text>
  </g>
  <g transform="translate(200, 180)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W2:B</text>
  </g>
  <g transform="translate(200, 300)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W2:C</text>
  </g>
  <g transform="translate(340, 120)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad2)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W3:D</text>
  </g>
  <g transform="translate(340, 240)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad2)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W3:E</text>
  </g>
  <g transform="translate(340, 360)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad2)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0a1628" text-anchor="middle" font-weight="bold">W3:F</text>
  </g>
  <g transform="translate(500, 240)">
    <rect x="0" y="0" width="80" height="40" rx="20" fill="url(#nodeGrad3)" opacity="0.9"/>
    <text x="40" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">W4:G</text>
  </g>
  <line x1="180" y1="260" x2="200" y2="200" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="180" y1="260" x2="200" y2="300" stroke="#22d3ee" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="200" x2="340" y2="140" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="200" x2="340" y2="260" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="320" x2="340" y2="260" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <line x1="280" y1="320" x2="340" y2="380" stroke="#2dd4bf" stroke-width="1.5" opacity="0.5"/>
  <line x1="420" y1="140" x2="500" y2="260" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <line x1="420" y1="260" x2="500" y2="260" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="#e0e7ff" text-anchor="middle" dominant-baseline="middle">DAG-Based AI Orchestration</text>
  <text x="600" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b8cba" text-anchor="middle" dominant-baseline="middle">Why Linear Agent Pipelines Break at Scale</text>
  <line x1="400" y1="510" x2="800" y2="510" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <text x="600" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#22d3ee" text-anchor="middle" letter-spacing="3">PARALLEL WAVES • DEPENDENCY RESOLUTION • FAILURE ISOLATION</text>
</svg>
